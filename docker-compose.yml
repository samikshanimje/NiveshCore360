version: '3.8'

services:
  # MySQL Database Instance
  db:
    image: mysql:8.0
    container_name: niveshcore360-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: niveshcore360
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  # Primary Desktop Application Web Wrapper
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: niveshcore360-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      # Inject connection URL referencing database container host
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/niveshcore360?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_PROFILES_ACTIVE=prod
    depends_on:
      - db

volumes:
  mysql-data:

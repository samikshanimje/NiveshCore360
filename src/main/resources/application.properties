# Spring Application Settings
spring.application.name=niveshcore360
spring.main.headless=false
spring.main.web-application-type=none

# ==========================================
# DATABASE CONFIGURATION
# ==========================================

# OPTION 1: In-Memory H2 Database (Active by default for frictionless testing)
spring.datasource.url=jdbc:h2:mem:niveshcore360;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# OPTION 2: MySQL 8 Connection (Uncomment to use local MySQL)
# spring.datasource.url=jdbc:mysql://localhost:3306/niveshcore360?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=password
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG

# Application Security and Log Details
logging.level.com.niveshcore360=INFO
